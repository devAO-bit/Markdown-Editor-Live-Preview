<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEXUS — Intelligent Workspace</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
</head>
<body data-theme="dark">

  <!-- Canvas Background -->
  <canvas id="bg-canvas"></canvas>

  <!-- Ambient Orbs -->
  <div class="ambient-layer">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Scanlines overlay -->
  <div class="scanlines"></div>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span class="theme-icon sun">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </span>
    <span class="theme-icon moon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </span>
  </button>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Main wrapper -->
  <main class="auth-wrapper">

    <!-- Floating Geometric Shapes -->
    <div class="geo-shapes">
      <div class="shape shape-ring"></div>
      <div class="shape shape-diamond"></div>
      <div class="shape shape-hex"></div>
    </div>

    <!-- Auth Card -->
    <div class="auth-card" id="authCard">

      <!-- Animated border gradient -->
      <div class="card-border"></div>
      <div class="card-glow"></div>

      <!-- Card Inner -->
      <div class="card-inner">

        <!-- Logo / Brand -->
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 40 40" fill="none">
              <polygon points="20,2 38,11 38,29 20,38 2,29 2,11" stroke="url(#hexGrad)" stroke-width="2" fill="none"/>
              <polygon points="20,8 32,14.5 32,27.5 20,34 8,27.5 8,14.5" fill="url(#hexFill)" opacity="0.3"/>
              <circle cx="20" cy="20" r="5" fill="url(#hexGrad)"/>
              <defs>
                <linearGradient id="hexGrad" x1="0" y1="0" x2="40" y2="40">
                  <stop offset="0%" stop-color="#00d4ff"/>
                  <stop offset="100%" stop-color="#a855f7"/>
                </linearGradient>
                <linearGradient id="hexFill" x1="0" y1="0" x2="40" y2="40">
                  <stop offset="0%" stop-color="#00d4ff"/>
                  <stop offset="100%" stop-color="#a855f7"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <span class="brand-name">NEXUS</span>
        </div>

        <!-- Tab Switcher -->
        <div class="tab-switcher">
          <button class="tab-btn active" data-tab="login">Sign In</button>
          <button class="tab-btn" data-tab="register">Create Account</button>
          <div class="tab-indicator"></div>
        </div>

        <!-- Forms Container -->
        <div class="forms-container">

          <!-- LOGIN FORM -->
          <div class="form-panel active" id="loginPanel">
            <div class="form-header">
              <h1>Welcome back</h1>
              <p>Access your intelligent workspace</p>
            </div>

            <!-- Social Logins -->
            <div class="social-row">
              <button class="social-btn" id="googleBtn">
                <svg viewBox="0 0 24 24" width="18" height="18">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Google
              </button>
              <button class="social-btn" id="githubBtn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                  <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                </svg>
                GitHub
              </button>
            </div>

            <div class="divider"><span>or continue with email</span></div>

            <form class="auth-form" id="loginForm" novalidate>
              <div class="field-group">
                <div class="input-wrap">
                  <span class="input-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
                    </svg>
                  </span>
                  <input type="email" id="loginEmail" class="auth-input" placeholder=" " autocomplete="email" required/>
                  <label for="loginEmail" class="float-label">Email address</label>
                  <div class="input-line"></div>
                </div>
              </div>

              <div class="field-group">
                <div class="input-wrap">
                  <span class="input-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                  </span>
                  <input type="password" id="loginPassword" class="auth-input" placeholder=" " autocomplete="current-password" required/>
                  <label for="loginPassword" class="float-label">Password</label>
                  <button type="button" class="eye-toggle" data-target="loginPassword">
                    <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="display:none">
                      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                      <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                  </button>
                  <div class="input-line"></div>
                </div>
              </div>

              <div class="form-meta">
                <label class="checkbox-wrap">
                  <input type="checkbox" id="rememberMe"/>
                  <span class="checkmark"></span>
                  <span>Remember me</span>
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
              </div>

              <button type="submit" class="submit-btn" id="loginSubmit">
                <span class="btn-text">Sign In</span>
                <span class="btn-loader" style="display:none">
                  <span class="spinner"></span>
                </span>
                <span class="btn-arrow">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
                    <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                  </svg>
                </span>
              </button>
            </form>
          </div>

          <!-- REGISTER FORM -->
          <div class="form-panel" id="registerPanel">
            <div class="form-header">
              <h1>Join NEXUS</h1>
              <p>Create your intelligent workspace account</p>
            </div>

            <!-- Social Logins -->
            <div class="social-row">
              <button class="social-btn">
                <svg viewBox="0 0 24 24" width="18" height="18">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Google
              </button>
              <button class="social-btn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                  <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                </svg>
                GitHub
              </button>
            </div>

            <div class="divider"><span>or continue with email</span></div>

            <form class="auth-form" id="registerForm" novalidate>
              <div class="field-group">
                <div class="input-wrap">
                  <span class="input-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                  </span>
                  <input type="text" id="regName" class="auth-input" placeholder=" " autocomplete="name" required/>
                  <label for="regName" class="float-label">Full name</label>
                  <div class="input-line"></div>
                </div>
              </div>

              <div class="field-group">
                <div class="input-wrap">
                  <span class="input-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
                    </svg>
                  </span>
                  <input type="email" id="regEmail" class="auth-input" placeholder=" " autocomplete="email" required/>
                  <label for="regEmail" class="float-label">Email address</label>
                  <div class="input-line"></div>
                </div>
              </div>

              <div class="field-group">
                <div class="input-wrap">
                  <span class="input-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                  </span>
                  <input type="password" id="regPassword" class="auth-input" placeholder=" " autocomplete="new-password" required/>
                  <label for="regPassword" class="float-label">Password</label>
                  <button type="button" class="eye-toggle" data-target="regPassword">
                    <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="display:none">
                      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                      <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                  </button>
                  <div class="input-line"></div>
                </div>
                <!-- Password Strength -->
                <div class="strength-meter">
                  <div class="strength-bar" id="strengthBar"></div>
                </div>
                <span class="strength-label" id="strengthLabel"></span>
              </div>

              <div class="field-group">
                <div class="input-wrap">
                  <span class="input-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                      <polyline points="20 6 9 17 4 12"/>
                    </svg>
                  </span>
                  <input type="password" id="regConfirm" class="auth-input" placeholder=" " autocomplete="new-password" required/>
                  <label for="regConfirm" class="float-label">Confirm password</label>
                  <div class="input-line"></div>
                </div>
              </div>

              <div class="form-meta terms-row">
                <label class="checkbox-wrap">
                  <input type="checkbox" id="termsCheck" required/>
                  <span class="checkmark"></span>
                  <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                </label>
              </div>

              <button type="submit" class="submit-btn" id="registerSubmit">
                <span class="btn-text">Create Account</span>
                <span class="btn-loader" style="display:none">
                  <span class="spinner"></span>
                </span>
                <span class="btn-arrow">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
                    <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                  </svg>
                </span>
              </button>
            </form>
          </div>

        </div><!-- /forms-container -->

        <!-- Footer -->
        <p class="card-footer">
          Protected by <span class="glow-text">256-bit encryption</span> · <a href="#">Privacy</a>
        </p>

      </div><!-- /card-inner -->
    </div><!-- /auth-card -->

  </main>

  <script src="script.js"></script>
</body>
</html>
